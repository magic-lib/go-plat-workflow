name: "智能订单处理流程"

variables:
  name: "tianlin"
  sex: 1

responses:
  age: "{{dddd.aaa.id}}"

# Activities 定义（包含依赖关系）
activities:
  - id: "getUser"
    namespace: "user"
    activity: "getUserInfo"
    arguments:
      - key: "userId"
        value: "${variables.userId}"

  - id: "getOrder"
    namespace: "order"
    activity: "getOrderDetail"
    arguments:
      - key: "orderId"
        value: "${input.orderId}"

  - id: "checkInventory"
    namespace: "inventory"
    activity: "checkStock"
    arguments:
      - key: "productId"
        value: "${getOrder.responses.productId}"

  - id: "checkRisk"
    namespace: "risk"
    activity: "assessRisk"
    arguments:
      - key: "userId"
        value: "${getUser.responses.userId}"
      - key: "orderId"
        value: "${getOrder.responses.orderId}"
    depends_on: ["getUser", "getOrder"]

  - id: "calculateShipping"
    namespace: "logistics"
    activity: "calculateShippingFee"
    arguments:
      - key: "address"
        value: "${getUser.responses.address}"
      - key: "weight"
        value: "${getOrder.responses.totalWeight}"
      - key: "inventoryStatus"
        value: "${checkInventory.responses.status}"

  - id: "applyPromotion"
    namespace: "promotion"
    activity: "applyCoupon"
    arguments:
      - key: "userId"
        value: "${getUser.responses.userId}"
      - key: "orderId"
        value: "${getOrder.responses.orderId}"
      - key: "riskLevel"
        value: "${checkRisk.responses.level}"
    depends_on: ["getUser", "getOrder", "checkRisk"]

steps:
  - name: "黑名单拦截"
    condition: "${getUser.responses.isBlacklisted} == true"
    break_on_match: true
    on_error: "exit"
    actions:
      - id: "blockUser"
        namespace: "security"
        activity: "blockUser"

  - name: "VIP大额订单特殊处理"
    depends_on: ["getUser", "getOrder", "checkRisk"]
    condition: "${getUser.responses.userLevel} == 'VIP' && ${getOrder.responses.amount} > 5000 && ${checkRisk.responses.score} < 30"
    break_on_match: true
    actions:
      - id: "applyVIPDiscount"
        namespace: "promotion"
        activity: "calculateDiscount"

  - name: "库存不足补货"
    depends_on: ["getOrder", "checkInventory"]
    condition: "${checkInventory.responses.stock} < 10"
    break_on_match: false
    actions:
      - id: "autoRestock"
        namespace: "inventory"
        activity: "createRestockOrder"