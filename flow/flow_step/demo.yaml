name: "电商订单处理工作流"

variables:
  - key: "userId"
    value: "U123456"
    policy: "frontend"
  - key: "orderId"
    value: "ORD789012"
  - key: "region"
    value: "CN"
  - key: "currency"
    value: "CNY"

responses:
  finalResult: "{{processOrder.responses.success}}"
  errorMessage: "{{processOrder.responses.message}}"
  processingTime: "{{processOrder.responses.duration}}"

activities:
  - id: "validateUser"
    name: "用户检测"
    namespace: "user"
    activity: "validateUserInfo"
    arguments:
      - key: "userId"
        value: "${variables.userId}"
      - key: "region"
        value: "${variables.region}"
    control:
      timeout: 5
      cache_time: 300

  - id: "fetchOrder"
    namespace: "order"
    activity: "getOrderDetails"
    arguments:
      - key: "orderId"
        value: "${input.orderId}"
      - key: "currency"
        value: "${variables.currency}"
    control:
      timeout: 10

steps:
  - id: "fraudDetection"
    name: "欺诈检测拦截"
    depends_on:
      - id: "validateUser"
        namespace: "user"
        activity: "validateUserInfo"
      - id: "assessRiskLevel"
        namespace: "risk"
        activity: "evaluateTransactionRisk"
    condition: "${assessRiskLevel.responses.riskScore} > 80 || ${validateUser.responses.isBlacklisted} == true"
    on_error: "exit"
    on_exit: "exit"
    strategy:
      - id: "blockTransaction"
        namespace: "security"
        activity: "blockSuspiciousOrder"
        arguments:
          - key: "orderId"
            value: "${fetchOrder.responses.orderId}"
          - key: "reason"
            value: "高风险交易或黑名单用户"
        control:
          timeout: 5

  - id: "vipPriorityProcessing"
    name: "VIP优先处理"
    depends_on:
      - id: "validateUser"
        namespace: "user"
        activity: "validateUserInfo"
      - id: "fetchOrder"
        namespace: "order"
        activity: "getOrderDetails"
      - id: "assessRiskLevel"
        namespace: "risk"
        activity: "evaluateTransactionRisk"
    condition: "${validateUser.responses.userTier} == 'VIP' && ${fetchOrder.responses.totalAmount} > 10000 && ${assessRiskLevel.responses.riskScore} < 20"
    on_error: "continue"
    on_exit: "continue"
    strategy:
      - id: "expeditedProcessing"
        namespace: "priority"
        activity: "enableFastTrack"
        arguments:
          - key: "orderId"
            value: "${fetchOrder.responses.orderId}"
          - key: "priorityLevel"
            value: "HIGH"
      - id: "vipBonusPoints"
        namespace: "loyalty"
        activity: "awardBonusPoints"
        arguments:
          - key: "userId"
            value: "${validateUser.responses.userId}"
          - key: "points"
            value: "${fetchOrder.responses.totalAmount} * 0.02"