name: 测试工作流

# 全局变量，入参
variables:
  - key: userId
    value: "U123456"
  - key: orderId
    value: "ORD789012"

# 公共 Activities 资源
activities:
  - id: commonLog
    activity: Log
    arguments:
      - key: message
        value: "工作流日志"
    control:
      temp_cacheable: false

  - id: setOrderInfo
    namespace: order
    activity: SetOrderInfo
    arg_template: "{{variables.orderId}}"
    control:
      temp_cacheable: true

# 工作流步骤
steps:
  - id: step1
    name: "第一步：获取订单信息"
    condition: "true"
    strategy:
      - id: setOrderInfo
        arg_template: "{{variables.orderId}}"
        control:
          timeout: 5

  - id: step2
    name: "第二步：条件设置订单"
    depends_on:
      - id: commonLog
    condition: "[step1.responses]"
    strategy:
      - id: setOrderInfo
        arg_template: "{{variables.orderId}}"
        control:
          timeout: 5

# 最终响应配置
responses:
  orderName: "{{step1.responses}}"
  success: "{{step2.responses}}"